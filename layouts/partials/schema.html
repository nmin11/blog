{{ if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": {{ .Title | jsonify }},
  "description": {{ with .Description }}{{ . | jsonify }}{{ else }}{{ .Summary | jsonify }}{{ end }},
  "url": {{ .Permalink | jsonify }}
  {{ with .PublishDate }}, "datePublished": {{ .Format "2006-01-02T15:04:05-07:00" | jsonify }}{{ end }}
  {{ with .Lastmod }}, "dateModified": {{ .Format "2006-01-02T15:04:05-07:00" | jsonify }}{{ end }}
  {{ with .Site.Params.title }}, "publisher": { "@type": "Organization", "name": {{ . | jsonify }} }{{ end }}
}
</script>
{{ end }}
